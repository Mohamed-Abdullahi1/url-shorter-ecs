name: Terraform Deploy

on:
  workflow_run:
    workflows:
      - Build and Push Images
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      image_tag:
        description: Existing image SHA to deploy
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-deploy-dev
  cancel-in-progress: false

env:
  TF_WORKING_DIR: infra/envs/dev
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  deploy:
    name: Deploy infrastructure
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolve image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || 'main' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: url-shortener-terraform-deploy

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_username: urladmin
          TF_VAR_db_name: urlshortener
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}
          TF_VAR_image_tag: ${{ steps.image.outputs.image_tag }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_username: urladmin
          TF_VAR_db_name: urlshortener
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}
          TF_VAR_image_tag: ${{ steps.image.outputs.image_tag }}
        run: terraform apply -input=false -auto-approve tfplan
