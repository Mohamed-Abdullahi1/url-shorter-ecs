name: Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "services/**"
      - "frontend/**"
      - ".github/workflows/docker-build-push.yml"

  workflow_dispatch:
    inputs:
      service:
        description: Service to build
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - worker
          - dashboard
          - frontend

permissions:
  contents: read
  id-token: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Create matrix
        id: matrix
        env:
          SELECTED_SERVICE: ${{ inputs.service || 'all' }}
          API_REPOSITORY: ${{ secrets.API_ECR_REPOSITORY }}
          WORKER_REPOSITORY: ${{ secrets.WORKER_ECR_REPOSITORY }}
          DASHBOARD_REPOSITORY: ${{ secrets.DASHBOARD_ECR_REPOSITORY }}
          FRONTEND_REPOSITORY: ${{ secrets.FRONTEND_ECR_REPOSITORY }}
        run: |
          MATRIX=$(jq -cn \
            --arg selected "$SELECTED_SERVICE" \
            --arg api "$API_REPOSITORY" \
            --arg worker "$WORKER_REPOSITORY" \
            --arg dashboard "$DASHBOARD_REPOSITORY" \
            --arg frontend "$FRONTEND_REPOSITORY" \
            '[
              {
                service: "api",
                context: "./app",
                repository: $api
              },
              {
                service: "worker",
                context: "./services/worker",
                repository: $worker
              },
              {
                service: "dashboard",
                context: "./services/dashboard",
                repository: $dashboard
              },
              {
                service: "frontend",
                context: "./frontend",
                repository: $frontend
              }
            ]
            | if $selected == "all"
              then .
              else map(select(.service == $selected))
              end')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.service }}
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: url-shortener-${{ matrix.service }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          load: true
          pull: true
          tags: ${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.service }}:${{ github.sha }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"
          format: table

      - name: Push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ matrix.repository }}
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: |
          IMAGE_URI="${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}"

          docker tag "${SERVICE}:${IMAGE_TAG}" "$IMAGE_URI"
          docker push "$IMAGE_URI"
