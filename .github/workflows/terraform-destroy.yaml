name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type destroy-dev to confirm
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  TF_WORKING_DIR: infra/envs/dev
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  destroy:
    name: Destroy dev infrastructure
    runs-on: ubuntu-latest

    if: inputs.confirmation == 'destroy-dev'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: url-shortener-terraform-destroy

      - name: Resolve deployed image tag
        id: image
        run: |
          IMAGE_URI=$(aws ecs describe-task-definition \
            --task-definition url-shortener-api \
            --query "taskDefinition.containerDefinitions[0].image" \
            --output text)

          IMAGE_TAG="${IMAGE_URI##*:}"

          if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "None" ]; then
            echo "Unable to resolve deployed image tag"
            exit 1
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Destroying deployment using image tag: $IMAGE_TAG"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Create destroy plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}
          TF_VAR_image_tag: ${{ steps.image.outputs.image_tag }}
        run: |
          terraform plan \
            -destroy \
            -input=false \
            -lock-timeout=5m \
            -out=destroy.tfplan

      - name: Apply destroy plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}
          TF_VAR_image_tag: ${{ steps.image.outputs.image_tag }}
        run: |
          terraform apply \
            -input=false \
            -lock-timeout=5m \
            -auto-approve \
            destroy.tfplan
