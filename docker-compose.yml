services:
  api:
    build:
      context: ./app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/urlshortener?sslmode=disable
      BASE_URL: http://localhost:8080
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./services/worker
    ports:
      - "8090:8090"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/urlshortener?sslmode=disable
      SQS_QUEUE_URL: http://localstack:4566/000000000000/click-events
    depends_on:
      - postgres
      - redis
      - localstack

  dashboard:
    build:
      context: ./services/dashboard
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/urlshortener?sslmode=disable
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: sqs
    ports:
      - "4566:4566"
